<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLD MAN STRENGTH</title>
<style>
  :root {
    --primary-bg: #f5f5f5;
    --accent-color: #ff6b6b;
    --card-bg: rgba(255,255,255,0.9);
    --text-color: #222222;
    --button-bg: #4e89ae;
    --button-hover: #43658b;
  }

  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: var(--primary-bg);
    color: var(--text-color);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background 0.5s;
  }

  body::before {
    content: '';
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(245,245,245,0.75);
    pointer-events: none;
    z-index: -1;
    transition: background 0.5s;
  }

  header {
    background: var(--accent-color);
    text-align: center;
    padding: 1rem;
    font-size: 2rem;
    font-weight: bold;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin: 1rem 0;
  }

  .tab-button {
    padding: 0.5rem 1.5rem;
    margin: 0.3rem;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: var(--button-bg);
    color: white;
    font-weight: bold;
    transition: transform 0.2s, background 0.3s;
  }

  .tab-button:hover {
    transform: scale(1.05);
    background: var(--button-hover);
  }

  .controls {
    text-align: center;
    margin: 1rem 0;
  }

  select {
    padding: 0.5rem 1rem;
    margin: 0.3rem;
    border-radius: 20px;
    border: 1px solid #aaa;
    font-weight: bold;
    cursor: pointer;
  }

  .exercise-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1200px;
    margin: auto;
  }

  .exercise-card {
    background: var(--card-bg);
    color: var(--text-color);
    border-radius: 15px;
    padding: 0.5rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .exercise-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .exercise-card h4 {
    text-align: center;
    margin: 0.5rem 0;
  }

  .exercise-card p {
    text-align: center;
    margin: 0.2rem 0;
    font-weight: bold;
  }

  .exercise-card a {
    display: block;
    text-align: center;
    margin-top: 0.3rem;
    color: var(--accent-color);
    text-decoration: none;
    font-size: 0.9rem;
  }

  .exercise-card a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<header>🏋️ OLD MAN STRENGTH</header>

<div class="tabs">
  <button class="tab-button" onclick="showMainTab('band')">Band Workouts</button>
  <button class="tab-button" onclick="showMainTab('db')">Dumbbell Workouts</button>
  <button class="tab-button" onclick="showMainTab('resources')">Resources</button>
</div>

<div class="controls" id="controls">
  <label for="week-select">Week:</label>
  <select id="week-select" onchange="populateExercises()">
    {% for w in range(1,weeks+1) %}
      <option value="{{ w }}">Week {{ w }}</option>
    {% endfor %}
  </select>

  <label for="day-select">Day:</label>
  <select id="day-select" onchange="populateExercises()">
    <option value="Lower Body">Lower Body</option>
    <option value="Upper Body">Upper Body</option>
  </select>
</div>

<div id="band" class="exercise-container"></div>
<div id="db" class="exercise-container" style="display:none;"></div>
<div id="resources" class="exercise-container" style="display:none;"></div>

<script>
let program = {{ program | tojson }};
let exerciseVideos = {{ exercise_videos | tojson }};

const backgrounds = {
  'Band': 'url("https://cdn.shopify.com/s/files/1/0104/9926/0474/files/BANDHOOK16_Save-Mob.jpg")',
  'DB': 'url("https://img.freepik.com/premium-photo/rows-dumbbells-gym-dark-colors_651225-141.jpg")',
  'default': 'var(--primary-bg)'
};

function showMainTab(tab) {
  document.getElementById('band').style.display = (tab==='band') ? 'grid' : 'none';
  document.getElementById('db').style.display = (tab==='db') ? 'grid' : 'none';
  document.getElementById('resources').style.display = (tab==='resources') ? 'grid' : 'none';
  document.getElementById('controls').style.display = (tab!=='resources') ? 'block' : 'none';

  if(tab === 'band') document.body.style.backgroundImage = backgrounds['Band'];
  else if(tab === 'db') document.body.style.backgroundImage = backgrounds['DB'];
  else document.body.style.backgroundImage = backgrounds['default'];

  populateExercises();
}

// Load all unique resources
function loadResources() {
  const resContainer = document.getElementById('resources');
  resContainer.innerHTML = "";
  const added = new Set();

  for(const weekKey in program){
    for(const dayKey in program[weekKey]){
      program[weekKey][dayKey].forEach(ex => {
        if(added.has(ex.exercise)) return;
        added.add(ex.exercise);
        const card = document.createElement('div');
        card.className = "exercise-card";
        card.id = ex.exercise.replace(/\s/g,"-");
        const videoLink = exerciseVideos[ex.exercise] || "#";
        card.innerHTML = `<h4>${ex.exercise}</h4>
                          <a href="${videoLink}" target="_blank">Watch Video</a>`;
        resContainer.appendChild(card);
      });
    }
  }
}

// Scroll to resource, highlight, and open YouTube
function goToResourceAndVideo(resourceId){
  const elem = document.getElementById(resourceId);
  if(elem){
    showMainTab('resources');
    elem.scrollIntoView({behavior:"smooth", block:"center"});
    elem.style.border="3px solid var(--accent-color)";
    setTimeout(()=>{elem.style.border="";},2000);

    // Open YouTube automatically after small delay for smooth scroll
    const videoLink = elem.querySelector('a')?.href;
    if(videoLink && videoLink !== "#"){
      setTimeout(()=>{window.open(videoLink, "_blank");}, 500);
    }
  }
}

// Populate exercises per week/day
function populateExercises() {
  const week = parseInt(document.getElementById('week-select').value); // ensure numeric
  const day = document.getElementById('day-select').value.trim();       // remove extra spaces
  const currentTab = document.getElementById('band').style.display === 'grid' ? 'Band' : 'DB';
  const container = currentTab === 'Band' ? document.getElementById('band') : document.getElementById('db');
  container.innerHTML = '';

  if(!program[week] || !program[week][day]){
    container.innerHTML = `<p style="text-align:center;color:red;">No exercises found for Week ${week} - ${day}</p>`;
    return;
  }

  const exercises = program[week][day].filter(ex => ex.type === currentTab);

  if(exercises.length === 0){
    container.innerHTML = `<p style="text-align:center;color:red;">No ${currentTab} exercises for Week ${week} - ${day}</p>`;
    return;
  }

  for(let i=0;i<7;i++){
    const ex = exercises[i % exercises.length];
    const card = document.createElement('div');
    card.className = 'exercise-card';
    const resourceId = ex.exercise.replace(/\s/g,"-");
    card.innerHTML = `<h4>${ex.exercise}</h4>
                      <p>Sets: ${ex.sets}, Reps: ${ex.reps}</p>
                      <p>Weight: ${ex.weight} lbs</p>
                      <a href="#" onclick="goToResourceAndVideo('${resourceId}')">Video →</a>`;
    container.appendChild(card);
  }
}

// Initialize
loadResources();
showMainTab('band');
</script>
</body>
</html>
